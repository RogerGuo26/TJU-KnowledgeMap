services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: localpassword
      NEO4J_DB: neo4j
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/localpassword
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p localpassword 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j-data:
  neo4j-logs:
