services:
  neo4j-init:
    image: ${NEO4J_IMAGE:-docker.m.daocloud.io/library/neo4j:5-community}
    entrypoint: ["sh", "-c"]
    command: >
      "if [ ! -f /data/databases/neo4j/neostore ]; then
        neo4j-admin database load neo4j --from-path=/dumps --overwrite-destination=true;
      fi"
    volumes:
      - neo4j-data:/data
      - ./dumps:/dumps:ro

  api:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:22-alpine}
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: localpassword
      NEO4J_DB: neo4j
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: ${NEO4J_IMAGE:-docker.m.daocloud.io/library/neo4j:5-community}
    depends_on:
      neo4j-init:
        condition: service_completed_successfully
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/localpassword
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p localpassword 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j-data:
  neo4j-logs:
